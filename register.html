<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Storyboarding Portal</title>
    <link rel="icon" href="admin/image/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* Custom Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .modal-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .modal-icon.success { background: linear-gradient(135deg, #69c924, #4a9e1c); }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-8">
                <a href="index.html" class="flex flex-col items-center">
                    <img src="admin/image/logo.png" alt="Logo" class="h-16 mb-2">
                    <span class="text-3xl font-bold text-purple-600">Storyboarding Portal</span>
                </a>
                <h2 class="text-2xl font-bold text-gray-800 mt-4">Create Account</h2>
                <p class="text-gray-500">Join and start creating quizzes</p>
            </div>

            <form id="registerForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition"
                        placeholder="Choose a username">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition"
                        placeholder="Enter your email">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition"
                        placeholder="Create a password">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">I am a...</label>
                    <select id="role" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition">
                        <option value="student">Student</option>
                        <option value="instructor">Teacher/Instructor</option>
                    </select>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Already have an account? <a href="login.html" class="text-purple-600 font-semibold hover:underline">Sign in</a></p>
            </div>

            <div class="mt-4 text-center">
                <a href="index.html" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="customModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="modalIcon" class="modal-icon"><i id="modalIconClass" class="fas fa-times-circle text-3xl text-white"></i></div>
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-2"></h3>
            <p id="modalMessage" class="text-gray-600 mb-5"></p>
            <button onclick="document.getElementById('customModal').classList.add('hidden')" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2.5 rounded-xl font-semibold transition w-full">OK</button>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const response = await fetch('api/auth.php?action=register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, role })
                });
                const data = await response.json();

                if (response.ok) {
                    showAlert('Success!', 'Registration successful! Please login.', 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showAlert('Registration Failed', data.error || 'Please try again', 'error');
                }
            } catch (error) {
                showAlert('Error', 'An error occurred. Please try again.', 'error');
            }

            function showAlert(title, message, type) {
                const modal = document.getElementById('customModal');
                const icon = document.getElementById('modalIcon');
                const iconClass = document.getElementById('modalIconClass');
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalMessage').textContent = message;
                icon.className = 'modal-icon ' + type;
                iconClass.className = 'fas ' + (type === 'success' ? 'fa-check-circle' : 'fa-times-circle') + ' text-3xl text-white';
                modal.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
