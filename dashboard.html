<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Storyboarding Portal</title>
    <link rel="icon" href="admin/image/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        
        /* Custom Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: scaleIn 0.3s ease-out;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .modal-icon.warning { background: linear-gradient(135deg, #f9a825, #f57f17); }
        .modal-icon.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .modal-icon.success { background: linear-gradient(135deg, #69c924, #4a9e1c); }
        .modal-icon.info { background: linear-gradient(135deg, #46178f, #6b21a8); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-3">
                        <img src="admin/image/logo.png" alt="Logo" class="h-10">
                        <span class="text-2xl font-bold text-purple-600">Storyboarding Portal</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="userName" class="text-gray-700 font-medium"></span>
                    <button onclick="logout()" class="text-gray-600 hover:text-gray-900 px-4 py-2">
                        <i class="fas fa-sign-out-alt mr-1"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold text-gray-800">My Quizzes</h1>
            <button onclick="showCreateQuizModal()" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-purple-700 transition">
                <i class="fas fa-plus mr-2"></i>Create Quiz
            </button>
        </div>

        <!-- Quiz List -->
        <div id="quizList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Quizzes will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-16 hidden">
            <div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-clipboard-list text-4xl text-gray-400"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">No quizzes yet</h3>
            <p class="text-gray-500 mb-6">Create your first quiz to get started!</p>
            <button onclick="showCreateQuizModal()" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-purple-700 transition">
                <i class="fas fa-plus mr-2"></i>Create Quiz
            </button>
        </div>
    </div>

    <!-- Create Quiz Modal -->
    <div id="createQuizModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
            <div class="p-6 border-b">
                <h2 class="text-2xl font-bold text-gray-800">Create New Quiz</h2>
            </div>
            <form id="createQuizForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Quiz Title</label>
                    <input type="text" id="quizTitle" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition"
                        placeholder="Enter quiz title">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description (optional)</label>
                    <textarea id="quizDescription" rows="3"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition"
                        placeholder="Enter quiz description"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Time per Question (seconds)</label>
                    <select id="quizTimeLimit" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition">
                        <option value="20">20 seconds</option>
                        <option value="60">60 seconds</option>
                        <option value="120">120 seconds</option>
                    </select>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="hideCreateQuizModal()" class="flex-1 px-6 py-3 rounded-xl border border-gray-300 text-gray-700 font-semibold hover:bg-gray-50 transition">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 bg-purple-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-purple-700 transition">
                        Create
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="customModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="modalIcon" class="modal-icon"><i id="modalIconClass" class="fas fa-exclamation-triangle text-3xl text-white"></i></div>
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-2"></h3>
            <p id="modalMessage" class="text-gray-600 mb-5"></p>
            <div id="modalButtons" class="flex gap-3 justify-center"></div>
        </div>
    </div>

    <script>
        function showModal(options) {
            const modal = document.getElementById('customModal');
            const icon = document.getElementById('modalIcon');
            const iconClass = document.getElementById('modalIconClass');
            const title = document.getElementById('modalTitle');
            const message = document.getElementById('modalMessage');
            const buttons = document.getElementById('modalButtons');

            icon.className = 'modal-icon ' + (options.type || 'info');
            const iconMap = { warning: 'fa-exclamation-triangle', error: 'fa-times-circle', success: 'fa-check-circle', info: 'fa-info-circle' };
            iconClass.className = 'fas ' + (iconMap[options.type] || iconMap.info) + ' text-3xl text-white';

            title.textContent = options.title || 'Notice';
            message.textContent = options.message || '';
            buttons.innerHTML = '';

            if (options.buttons) {
                options.buttons.forEach(btn => {
                    const button = document.createElement('button');
                    button.textContent = btn.text;
                    button.className = btn.primary 
                        ? 'bg-purple-600 hover:bg-purple-500 text-white px-5 py-2.5 rounded-xl font-semibold transition flex-1'
                        : 'bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-2.5 rounded-xl font-semibold transition flex-1';
                    button.onclick = () => { if (btn.onClick) btn.onClick(); modal.classList.add('hidden'); };
                    buttons.appendChild(button);
                });
            }
            modal.classList.remove('hidden');
        }

        function showConfirm(title, message, onConfirm) {
            showModal({ type: 'warning', title, message, buttons: [
                { text: 'Cancel', primary: false },
                { text: 'Delete', primary: true, onClick: onConfirm }
            ]});
        }

        function showAlert(title, message, type = 'info') {
            showModal({ type, title, message, buttons: [{ text: 'OK', primary: true }] });
        }

        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = user.username;

        // Load quizzes
        async function loadQuizzes() {
            try {
                const response = await fetch(`api/quiz.php?action=get_quizzes&user_id=${user.id}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    showAlert('Error', errorData.error || 'Failed to load quizzes', 'error');
                    return;
                }
                
                const quizzes = await response.json();

                const quizList = document.getElementById('quizList');
                const emptyState = document.getElementById('emptyState');

                if (!Array.isArray(quizzes) || quizzes.length === 0) {
                    quizList.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                } else {
                    quizList.classList.remove('hidden');
                    emptyState.classList.add('hidden');
                    quizList.innerHTML = quizzes.map(quiz => `
                        <div class="bg-white rounded-xl shadow-sm border p-6 hover:shadow-md transition">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
                                    <i class="fas fa-clipboard-list text-purple-600 text-xl"></i>
                                </div>
                                <span class="px-3 py-1 rounded-full text-xs font-medium ${quiz.is_published ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">
                                    ${quiz.is_published ? 'Published' : 'Draft'}
                                </span>
                            </div>
                            <h3 class="text-lg font-semibold text-gray-800 mb-2">${quiz.title}</h3>
                            <p class="text-gray-500 text-sm mb-4">${quiz.description || 'No description'}</p>
                            <div class="flex items-center justify-between">
                                <span class="text-gray-400 text-sm"><i class="fas fa-clock mr-1"></i>${quiz.time_limit}s</span>
                                <div class="flex gap-2">
                                    <button onclick="editQuiz(${quiz.id})" class="text-purple-600 hover:text-purple-800 p-2">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="hostGame(${quiz.id})" class="text-green-600 hover:text-green-800 p-2">
                                        <i class="fas fa-play"></i>
                                    </button>
                                    <button onclick="deleteQuiz(${quiz.id})" class="text-red-600 hover:text-red-800 p-2">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                showAlert('Error', 'Failed to load quizzes', 'error');
            }
        }

        loadQuizzes();

        // Modal functions
        function showCreateQuizModal() {
            document.getElementById('createQuizModal').classList.remove('hidden');
        }

        function hideCreateQuizModal() {
            document.getElementById('createQuizModal').classList.add('hidden');
            document.getElementById('createQuizForm').reset();
        }

        // Create quiz
        document.getElementById('createQuizForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('quizTitle').value;
            const description = document.getElementById('quizDescription').value;
            const time_limit = document.getElementById('quizTimeLimit').value;

            try {
                const response = await fetch('api/quiz.php?action=create_quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, user_id: user.id, time_limit: parseInt(time_limit) })
                });
                const data = await response.json();

                if (response.ok) {
                    hideCreateQuizModal();
                    loadQuizzes();
                } else {
                    showAlert('Error', data.error || 'Failed to create quiz', 'error');
                }
            } catch (error) {
                showAlert('Error', 'An error occurred', 'error');
            }
        });

        // Edit quiz
        function editQuiz(quizId) {
            window.location.href = `quiz-editor.html?quiz_id=${quizId}`;
        }

        // Host game
        async function hostGame(quizId) {
            try {
                const response = await fetch('api/game.php?action=create_game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quiz_id: quizId })
                });
                const data = await response.json();

                if (response.ok) {
                    window.location.href = `host-game.html?game_id=${data.game_id}&game_pin=${data.game_pin}`;
                } else {
                    showAlert('Error', data.error || 'Failed to create game', 'error');
                }
            } catch (error) {
                showAlert('Error', 'An error occurred', 'error');
            }
        }

        // Delete quiz
        async function deleteQuiz(quizId) {
            showConfirm('Delete Quiz?', 'Are you sure you want to delete this quiz? This action cannot be undone.', async () => {
                try {
                    const response = await fetch(`api/quiz.php?action=delete_quiz&quiz_id=${quizId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        loadQuizzes();
                    } else {
                        showAlert('Error', 'Failed to delete quiz', 'error');
                    }
                } catch (error) {
                    showAlert('Error', 'An error occurred', 'error');
                }
            });
        }

        // Logout
        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
